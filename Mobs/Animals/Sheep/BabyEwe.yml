BabyEwe:
  Health: 10
  Type: SHEEP
  Display: Baby Ewe
  Options:
    PreventOtherDrops: true
    Baby: true
    Despawn: false
  AIGoalSelectors:
  - clear
  - gotoparent
  - lookatplayers
  - randomstroll
  - eatgrass
  Variables:
       Age: baby
       Aggression: peaceful
       Sex: female
       Species: sheep
  Skills:
  #30 mins assumed before this mob is considered an adult
  - skill:AdultBehaviour{AdultName=Ewe;sync=true} @self ~onTimer:100 ?!isbaby ?varEquals{var=caster.Age;value=baby}
  #20 mins delay for breeding cannot birth another child for 100 minutes, births 1-3 babies per cycle
  - skill:AnimalBirth{sound=entity.sheep.hurt;;delay=36000;cooldown=120000} @self ~onSignal:BREED
  - skill{s=AnimalFollowMale} ~onTimer:100
  #Dies after 300 * 4 + 10 + 720 + 30 = 1960 mins of existance
  - skill{s=EndOfLife;delay="1960*60*20";sync=true} ~onSpawn
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Ram,BabyRam;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Drops carcass if adult
  - skill{s=DropSheepCarcass} ~onDeath