Ram:
  Health: 15
  Damage: 4
  Type: SHEEP
  Display: Ram
  Options:
    PreventOtherDrops: true
    Despawn: false
  Modules:
    ThreatTable: true
  Variables:
       Age: adult
       Aggression: defensive
       Sex: male
       Species: sheep
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #10 mins delay for breeding upon spawning and with a 100-300 mins interval between breeding and will repeat 1to4
  #Interval: 120000to360000 delay: 12000
  - signal{s=BREED;repeat=0to3;repeatInterval=120000to360000;delay=12000;sync=true} @MIR{r=25;types=Ewe,BabyEwe;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 300 * 4 + 10 + 720 = 1930 mins of existance
  - skill{s=EndOfLife;delay="1930*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Ram,BabyRam;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if herd is attacked and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass
  - skill{s=DropSheepCarcass} ~onDeath