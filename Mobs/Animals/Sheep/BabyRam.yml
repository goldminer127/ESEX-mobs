BabyRam:
  Health: 15
  Damage: 4
  Type: SHEEP
  Display: Baby Ram
  Options:
    PreventOtherDrops: true
    Baby: true
    Despawn: false
  AIGoalSelectors:
  - clear
  - gotoparent
  - lookatplayers
  - randomstroll
  - eatgrass
  Modules:
    ThreatTable: true
  Variables:
       Age: baby
       Aggression: defensive
       Sex: male
       Species: sheep
  Skills:
  #30 mins assumed before this mob is considered an adult
  - skill:AdultBehaviour{AdultName=Ram;sync=true} @self ~onTimer:100 ?!isbaby ?varEquals{var=caster.Age;value=baby}
  #20 mins delay for breeding upon spawning and with a 100-300 mins interval between breeding and will repeat 1to4
  #Interval: 120000to360000
  - signal{s=BREED;repeat=0to3;repeatInterval=120000to360000;delay=36000;sync=true} @MIR{r=25;types=Ewe,BabyEwe;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 300 * 4 + 10 + 720 + 30 = 1960 mins of existance
  - skill{s=EndOfLife;delay="1960*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Ram,BabyRam;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if female is under attack AND this bull is marked as adult and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass if adult
  - skill{s=DropSheepCarcass} ~onDeath