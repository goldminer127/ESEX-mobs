BabyHeifer:
  Health: 10
  Type: COW
  Display: Baby Heifer
  Options:
    PreventOtherDrops: true
    Baby: true
    Despawn: false
  AIGoalSelectors:
  - clear
  - gotoparent
  - lookatplayers
  - randomstroll
  - eatgrass
  Variables:
       Age: baby
       Aggression: peaceful
       Sex: female
       Species: cow
  Skills:
  #30 mins assumed before this mob is considered an adult
  - skill:AdultBehaviour{AdultName=Heifer;sync=true} @self ~onTimer:100 ?!isbaby ?varEquals{var=caster.Age;value=baby}
  #20 min delay before breeding starts 80 mins before this mob can produce babies, births 1 cow per cycle
  - skill:AnimalBirth{sound=entity.cow.hurt;delay=36000;cooldown=96000} @self ~onSignal:BREED
  - skill{s=AnimalFollowMale;sync=true;delay=36000} ~onTimer:100
  #Dies after 120 * 12 + 10 + 720 + 30 = 2200 mins of existance
  - skill{s=EndOfLife;delay="2200*60*20";sync=true} ~onSpawn
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Bull,BabyBull;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Drops carcass if adult
  - skill{s=DropCowCarcass} ~onDeath