BabyBull:
  Health: 15
  Damage: 4
  Type: COW
  Display: Baby Bull
  Options:
    PreventOtherDrops: true
    Baby: true
    Despawn: false
  AIGoalSelectors:
  - clear
  - gotoparent
  - lookatplayers
  - randomstroll
  - eatgrass
  Modules:
    ThreatTable: true
  Variables:
       Age: baby
       Aggression: defensive
       Sex: male
       Species: cow
  Skills:
  #30 mins assumed before this mob is considered an adult
  - skill:AdultBehaviour{AdultName=Bull;sync=true} @self ~onTimer:100 ?!isbaby ?varEquals{var=caster.Age;value=baby}
  #20 min delay before breeding starts 40 mins before this mob can produce babies upon spawning and with a 80-120 mins interval between breeding and will repeat 4to12
  #Interval: 96000to144000
  - signal{s=BREED;repeat=3to11;repeatInterval=96000to144000;delay=36000;sync=true} @MIR{r=25;types=Heifer,BabyHeifer;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 120 * 12 + 10 + 720 + 30 = 2200 mins of existance
  - skill{s=EndOfLife;delay="2200*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Bull,BabyBull;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if female is under attack AND this bull is marked as adult and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass if adult
  - skill{s=DropCowCarcass} ~onDeath