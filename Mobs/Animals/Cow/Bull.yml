Bull:
  Health: 15
  Damage: 4
  Display: Bull
  Type: COW
  Options:
    PreventOtherDrops: true
    Despawn: false
  Modules:
    ThreatTable: true
  Variables:
       Age: adult
       Aggression: defensive
       Sex: male
       Species: cow
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #10 mins delay for breeding upon spawning and with a 80-120 mins interval between breeding and will repeat 4to12
  #Interval: 96000to144000 delay: 12000
  - signal{s=BREED;repeat=12;repeatInterval=100;delay=10;sync=true} @MIR{r=25;types=Heifer,BabyHeifer;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 120 * 12 + 10 + 720 = 2170 mins of existance
  - skill{s=EndOfLife;delay="2170*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Bull,BabyBull;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if herd is attacked and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass
  - skill{s=DropCowCarcass} ~onDeath