Heifer:
  Health: 10
  Type: COW
  Display: Heifer
  Options:
    PreventOtherDrops: true
    Despawn: false
  Variables:
       Age: adult
       Aggression: peaceful
       Sex: female
       Species: cow
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #Cannot birth another child for 80 minutes, births 1 cow per cycle
  - skill:AnimalBirth{sound=entity.cow.hurt;cooldown=96000} @self ~onSignal:BREED
  - skill{s=AnimalFollowMale} ~onTimer:100
  #Dies after 120 * 12 + 10 + 720 = 2170 mins of existance
  - skill{s=EndOfLife;delay="2170*60*20";sync=true} ~onSpawn
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Bull,BabyBull;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Drops carcass
  - skill{s=DropCowCarcass} ~onDeath