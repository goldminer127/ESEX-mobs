Stag:
  Health: 15
  Damage: 4
  Type: COW
  Display: Stag
  Options:
    PreventOtherDrops: true
    Despawn: false
    Silent: true
  Modules:
    ThreatTable: true
  Variables:
    Age: adult
    Aggression: defensive
    Sex: male
    Species: deer
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #10 mins delay for breeding upon spawning and with a 100-300 mins interval between breeding and will repeat 1to3
  #Interval: 120000to360000 delay: 12000
  - signal{s=BREED;repeat=0to2;repeatInterval=120000to360000;delay=12000;sync=true} @MIR{r=25;types=Hind,BabyHind;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 300 * 3 + 10 + 300 = 1210 mins of existance
  - skill{s=EndOfLife;delay="1210*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Stag,BabyStag;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if herd is attacked and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass
  - skill{s=DropDeerCarcass} ~onDeath