BabySow:
  Health: 10
  Type: Pig
  Display: Baby Sow
  Options:
    PreventOtherDrops: true
    Baby: true
    Despawn: false
  Variables:
    Age: baby
    Aggression: peaceful
    Sex: female
    Species: pig
  Skills:
  #30 mins assumed before this mob is considered an adult
  - skill:AdultBehaviour{AdultName=Sow;sync=true} @self ~onTimer:100 ?!isbaby ?varEquals{var=caster.Age;value=baby}
  #20 min delay before breeding starts Cannot birth another child for 120 minutes births 1-6 pigs per cycle
  - skill:AnimalBirth{sound=entity.pig.hurt;delay=36000;cooldown=144000} @self ~onSignal:BREED
  - skill{s=AnimalFollowMale} ~onTimer:100
  #Dies after 480 * 6 + 10 + 710 + 30 = 3630 mins of existance
  - skill{s=EndOfLife;delay="3630*60*20";sync=true} ~onSpawn
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Boar,BabyBoar;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Drops carcass
  - skill{s=DropPigCarcass} ~onDeath