Boar:
  Health: 15
  Damage: 2.5
  Display: Boar
  Type: PIG
  Options:
    PreventOtherDrops: true
    Despawn: false
  Modules:
    ThreatTable: true
  Variables:
    Age: adult
    Aggression: defensive
    Sex: male
    Species: pig
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #10 mins delay for breeding upon spawning and with a 120-480 mins interval between breeding and will repeat 2to6
  #Interval: 144000to576000 delay: 12000
  - signal{s=BREED;repeat=1to5;repeatInterval=144000to576000;delay=12000;sync=true} @MIR{r=25;types=Sow,BabySow;limit=1;sort=RANDOM;conditions=[
                                                                                                                - varEquals{var=target.Age;value=adult} true
                                                                                                                - skillOnCooldown{skill=AnimalBirth} false
                                                                                                                ]} ~onSpawn
  #Dies after 480 * 6 + 10 + 710 = 3600 mins of existance
  - skill{s=EndOfLife;delay="3600*60*20";sync=true} ~onSpawn
  #Recieves speed buff when attacked
  - skill{s=AnimalRetaliation} ~onDamaged
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Boar,BabyBoar;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Attacks nearest player if herd is attacked and is buffed with strength and speed
  - skill{s=AnimalAggro} ~onSignal:HERDUNDERATTACK
  #Drops carcass
  - skill{s=DropPigCarcass} ~onDeath