DesertWolf:
  Type: WOLF
  Health: 20
  Damage: 2
  Display: Desert Wolf
  Faction: Wilderness
  AITargetSelectors:
  - clear
  - players
  - OtherFactionMonsters
  Options:
    FollowRange: 48
  Skills:
  - skill{s=DesertWolfBite} @target ~onAttack
  - skill{s=DesertWolfBitingCombo} @target ~onAttack
  - skill{s=WolfLeapBack} @self ~onDamaged
  - setVariable{var=caster.BiteStrikes;value=0} @self ~onSpawn
  - cancelevent{sync=true} ~onAttack
  - summon{type=DesertWolf;amount=1to10;radius=20;yRadius=0;onSurface=true} @self ~onSpawn ?!hasParent