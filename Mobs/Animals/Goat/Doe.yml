Doe:
  Health: 10
  Type: GOAT
  Display: Doe
  Options:
    PreventOtherDrops: true
    Despawn: false
    Silent: true
  Variables:
    Age: adult
    Aggression: peaceful
    Sex: female
    Species: goat
  Skills:
  - skill{s=AdultBehaviour} @self ~onSpawn
  #Cannot birth another child for 200 minutes, births 1 baby per cycle
  - skill:AnimalBirth{sound=item.ink_sac.use;cooldown=240000} @self ~onSignal:BREED
  - skill{s=AnimalFollowMale} ~onTimer:100
  #Dies after 400 * 3 + 10 + 700 = 3110 mins of existance
  - skill{s=EndOfLife;delay="3110*60*20";sync=true} ~onSpawn
  # Calls male if attacked
  - signal{s=HERDUNDERATTACK} @MIR{r=25;types=Buck,BabyBuck;limit=1;conditions=[   - varEquals{var=target.Age;value=adult} true ]} ~onDamaged
  #Drops carcass
  - skill{s=DropDeerCarcass} ~onDeath