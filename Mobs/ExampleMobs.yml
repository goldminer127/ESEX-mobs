Dummy:
  Type: Zombie
  Options:
    PreventRandomEquipment: true
    PreventOtherDrops: true
    PreventSunburn: true
    Silent: true
    NoAI: true
  Skills:
  #- skill{s=PlayerCombustXXX} @self ~onInteract

SpawnAnvil:
  Type: Zombie
  Options:
    PreventRandomEquipment: true
    PreventOtherDrops: true
    PreventSunburn: true
    Silent: true
    NoAI: true
    Invincible: true
  Skills:
  - setblock{m=ANVIL;md=0} @Location{location=-33,100,87} ~onTimer:5 #~onInteract

DeathTouchZombie:
  Type: Zombie
  Display: '&5Death Touch'
  Health: 50
  Options:
    AlwaysShowName: true
    PreventSunburn: true
    MovementSpeed: .425
  Skills:
  - potion{type=GLOWING;duration=9999999} @self ~onSpawn
  - damage{amount=5000;ignorearmor=true;repeat=20;repeatinterval=2} @target ~onAttack
  Drops:
  - PrimeCoin 1 1
  - SchlattCoin 1 1

SkeletalKnight:
  Type: WITHER_SKELETON
  Display: '&aSkeletal Knight'
  Health: 40
  Damage: 8
  Equipment:
  - IRON_HELMET HEAD
  - IRON_CHESTPLATE CHEST
  - IRON_LEGGINGS LEGS
  - IRON_BOOTS FEET
  - IRON_SWORD HAND
  - SHIELD OFFHAND
  Drops:
  - GOLD_NUGGET{display="Gold Coin"} 1to2 0.5
  LevelModifiers:
  - health 5
  - damage 0.5
  Options:
    MovementSpeed: 0.1

#
# A king of skeletons! Summons skeletal minions and
# has a teleport-and-smash attack.
# 
SkeletonKing:
  Type: WITHER_SKELETON
  Display: '&6Skeleton King'
  Health: 500
  Damage: 10
  Skills:
  - speak{m="None may challenge the Skeleton King!";cooldown=20} @PlayersInRadius{r=40} ~onCombat >0 0.2
  - speak{m="Ahahahahah! Die, <trigger.name>!"} @PlayersInRadius{r=40} ~onPlayerKill >0 1
  - skill{s=SummonSkeletons} @self 0.1
  - skill{s=SmashAttack} @target >0 0.2
  Equipment:
  - KingsCrown HEAD
  - SkeletonKingSword HAND
  Drops:
  - SkeletonKingDrops
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.2
    MaxCombatDistance: 25
    PreventOtherDrops: true

#
# One of the Skeleton King's weak minions
#
SkeletalMinion:
  Type: SKELETON
  Display: '&2Skeletal Minion'
  Health: 10
  Damage: 2
  Options:
    MovementSpeed: 0.1
    
#
# A staticy sheep that blasts everything near it
# with lightning bolts! It also takes no damage
# from lightning and half damage from fire.
#
StaticallyChargedSheep:
  Type: SHEEP
  Display: '&aStatically Charged Sheep'
  Health: 100
  Damage: 2
  Options:
    MovementSpeed: 0.3
  DamageModifiers:
  - LIGHTNING 0
  - FIRE 0.5
  Skills:
  - lightning @LivingInRadius{r=10} ~onTimer:100

#
# A giant angry slime that pulses waves of poisons at
# all players that are nearby!
#
AngrySludge:
  Type: SLIME
  Display: '&aAngry Sludge'
  Health: 100
  Damage: 2
  Options:
    Size: 20
    MovementSpeed: 0.1
    PreventSlimeSplit: true
    PreventOtherDrops: true
    MaxCombatDistance: 30
    KnockbackResistance: 1
  Skills:
  - skill{s=AngrySludgePoison} 0.2
  - blockmask{material=SLIME_BLOCK;r=1;duration=100} @self ~onTimer:20