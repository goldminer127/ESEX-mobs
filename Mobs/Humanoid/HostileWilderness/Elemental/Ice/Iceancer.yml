Iceancer:
  Type: SKELETON
  Health: 50
  Damage: 1
  Faction: Wilderness
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll
  - lookatplayers
  - randomlookaround
  AITargetSelectors:
  - clear
  - attacker
  Options:
    PreventSunburn: true
    PreventOtherDrops: true
    PreventRandomEquipment: true
    MovementSpeed: 0.375
    Despawn: false
  Skills:
  - setVariable{var=caster.PiercingStrikes;value=0} @self ~onSpawn
  - skill{s=IceancerPiercing} @target ~onAttack
  - skill{s=IceancerBrainFreeze;delay=100} @self ~onCombat
  - cancelevent{sync=true} ~onAttack
  - dismount ~onTimer:10