GemSkeleton:
  Type: SKELETON
  Display: gem
  Faction: Gemmers
  Armor: 5
  Modules:
    ThreatTable: true
  Equipment:
  - mmoitems{type=BOW;id=MAKE_BOW} HAND
  Options:
    PreventOtherDrops: true
    PreventRandomEquipment: true
  Skills:
