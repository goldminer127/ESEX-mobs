TundraBear:
  Type: POLAR_BEAR
  Health: 180
  Damage: 20
  Display: '&3Mother Tundra Bear'
  Options:
    AlwaysShowName: true
  Faction: TundraBearFac
  Disguise: POLAR_BEAR
  BossBar:
    Enabled: true
    Title: '&3Momma Bear'
    Color: BLUE
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll
  AITargetSelectors:
  - clear
  - players
  Skills:
  - summon{t=TundraBearCub;a=2-4} @self ~onSpawn
  - skill{s=mommaBearRage} @self ~onSignal:cubRage
  - skill{s=mommaBearMad} @self ~onSignal:cubHit

TundraBearCub:
  Type: POLAR_BEAR
  Options:
    Baby: true
  Faction: TundraBearFac
  Disguise: POLAR_BEAR
  Skills:
  - signal{s=cubRage} @MIR{r=64;types=TundraBear} ~onDeath
  - skill{s=cubHit} @self ~onDamaged