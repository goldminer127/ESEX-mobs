PiglinPet:
  Type: baby_PIGLIN
  Health: 24
  Damage: 10
  Options:
    MovementSpeed: .3
    PreventOtherDrops: true
    PreventSunburn: true
    AlwaysShowName: true
    Silent: true
    Invulnerable: true
    Despawn: persistent
  Equipment:
  - AIR HAND
  - AIR OFFHAND
  AIGoalSelectors:
  - clear
  - gotoowner 5
  - randomstroll
  - randomlookaround
  - lookatplayers
  Skills:
  - skill{s=TamePet} @NearestPlayer{r=5} ~onSpawn
  - skill{s=DespawnPiglinPet} @owner{r=100} ~onInteract
#  - skill{s=DropGold} @self ~onTimer:20
  - skill{s=DespawnPetNoInv} @owner{r=100} ~onInteract
  - skill{s=TeleportBackToOwner} @self ~onTimer:20
  
