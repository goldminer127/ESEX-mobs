VoidReaver:
  Type: Enderman
  Display: '&cVoid Reaver'
  Health: 100
  Damage: 5
  Options:
    MovementSpeed: 0.135
    AlwaysShowName: true
    PreventOtherDrops: true
    PreventRandomEquipment: true
    PreventSunburn: true
    Silent: true
    NoAI: true
  Skills:
  - skill{s=voidReaverPrison} ~onTimer:200
  - jsonmessage{m="[{'text':'&cYou have been detained. Await your sentence at the end of Time.'}]"} @trigger ~onPlayerKill
  
