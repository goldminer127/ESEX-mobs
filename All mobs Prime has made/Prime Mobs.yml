Cerastes:
  Type: Zombie
  Display: '&bCerastes'
  Health: 100
  Damage: 5
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    PreventRandomEquipment: true
    PreventSunburn: true
    Silent: true
    NoAI: true
  Skills:
  - skill{s=setPhaseDelay} @self ~onSpawn
  - skill{s=healthBarActionMessage} @PIR{r=20} ~onTimer:10
  - setvar{var=caster.phase;type=STRING;val="&3&lPHASE 1"} @self ~onSpawn
  - setvar{var=caster.phase;type=STRING;val="&2&lPHASE 2"} @self ~onTimer:10 =25%-75%
  - setvar{var=caster.phase;type=STRING;val="&1&lPHASE 3"} @self ~onTimer:10 <25%
  - skill{s=startPhase2} @self ~onTimer:10 =25-75%
  - skill{s=startPhase3} @self ~onTimer:10 <25%
  - skill{s=P1} @pir{r=32} ~onDamaged
  - skill{s=P2} @pir{r=32} ~onDamaged
  - skill{s=P3} @pir{r=32} ~onDamaged

