#Desert salamander skills

salamanderSandSpit:
  Skills:
  - projectile{onTick=salamanderSandSpit-Tick;onHit=salamanderSandSpit-Hit;v=12}
salamanderSandSpit-Tick:
  Skills:
  - effect:particles{p=block_dust;m=sand;amount=10} @origin
salamanderSandSpit-Hit:
  Skills:
  - damage{a=10}
  
attackAnimation:
  Skills:
  - randomskill{skills= salamanderAttackClaw, salamanderAttackTail}
salamanderAttackClaw:
  Skills:
  - playanimation{a=0;audience=World}
salamanderAttackTail:
  Skills:
  - playanimation{a=3;audience=World}




#desert wolf skill
  
desertWolfIgnite:
  Skills:
  - ignite{ticks=100} @target
  

#desert scorpion skills:

dScorpClawPinch:
  Skills:
  - playanimation{a=0;audience=World} @self
  - damage{a=4}
  - delay 20
  - skill{s=dScorpClawPinch2} .5
dScorpClawPinch2:
  Skills:
  - playanimation{a=3;audience=World} @self
  - damage{a=4}

dScorpStinger:
  Skills:
  - projectile{v=10;
               bulletType=ITEM;material=Ghast_Tear;
               onHit=dScorpStinger-Hit}
dScorpStinger-Hit:
  Skills:
  - damage{a=4}
  - potion{type=POISON;duration=600;level=0;p=true} @target

dScorpGrabAndSting:
  Skills:
  - leap{velocity=300;velocityY:30} @target
  - delay 10
  - stun{d=60;f=true} @target
  - stun{d=60} @self
  - damage{a=4}
  - playanimation{a=3;audience=World} @self
  - potion{type=POISON;duration=900;level=0;p=true} @target
  
