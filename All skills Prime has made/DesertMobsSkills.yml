#Flame ele:

flameElementalFireball:
  Skills:
  - projectile{bulletType=BLOCK;material=fire;onHit=flameElementalFireball-Hit;v=12;hnp=false} @target
  - sound{s=entity.blaze.shoot} @self
  
flameElementalFireball-Hit:
  Skills:
  - damage{a=10}
  - ignite{ticks=200} @target
  
flameElementalCombustion:
  Skills:
  - effect:particles{particle=explosion_huge;amount=3;hS=1;vS=2;speed=1} @self
  - sound{s=entity.generic.explode} @self
  - damage{a=35} @PIR{r=5}
  - ignite{ticks=200} @PIR{r=5}
 
