SmashAttack:
  Cooldown: 8
  Conditions:
  - targetwithin 25
  Skills:
  - leap @target
  - effect:sound{s=mob.endermen.portal;volume=.5;pitch=0.5}
  - delay 10
  - damage{amount=10;ignorearmor=f} @PlayersInRadius{r=5}
  - throw{velocity=10;velocityY=5} @PlayersInRadius{r=5}
  - effect:explosion @Self
  
