#Void Reaver:

voidReaverPrison:
  Skills:
  # sound effect for bubble getting bigger
  - effect:particlesphere{p=reddust;c=#000000;amount=100;y=0.5;s=0.00001;r=2} @origin
  - delay 10
  - effect:particlesphere{p=reddust;c=#000000;amount=100;y=0.5;s=0.00001;r=3} @origin
  - delay 10
  - effect:particlesphere{p=reddust;c=#000000;amount=150;y=0.5;s=0.00001;r=4} @origin
  - delay 10
  - effect:particlesphere{p=reddust;c=#000000;amount=200;y=0.5;s=0.00001;r=5} @origin
  - delay 10
  - effect:particlesphere{p=reddust;c=#000000;amount=500;y=0.5;s=0.00001;r=6} @origin
  - delay 10
  - effect:particlesphere{p=reddust;c=#000000;amount=2000;y=0.5;s=0.00001;r=7;repeat=9;repeatInterval=5} @origin
