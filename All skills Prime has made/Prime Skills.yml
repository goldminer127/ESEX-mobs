#Arena Raid Boss skills:

raidBossLOLArenaSpawn:
  Skills:
  - shield{amount=50;maxShield=100} #math requires premium
  - message{m=<caster.mhp>} @trigger

#cerastes:
healthBarActionMessage:
  Conditions:
  - offgcd
  Skills:
  - actionmessage{m="&6HP &c&l<mob.hp> &f/ &c&l<mob.mhp> &f/ <caster.var.phase>"}
setPhaseDelay:
  Skills:
  - actionmessage{m="&6HP &c&l<mob.hp> &f/ &c&l<mob.mhp>"} @PIR{r=20}
  - gcd{t=40}
  - delay 40
  - setvar{var=caster.phase;type=STRING;val="&3&lPHASE 1"}
  - skill{s=startPhase1}

startPhase1:
  Skills:
  - setstance{stance=phase1} @self
startPhase2:
  Skills:
  - setstance{stance=phase2} @self
startPhase3:
  Skills:
  - setstance{stance=phase3} @self

P1:
  Conditions:
  - stance{s=phase1;str=true} true
  Skills:
  - message{m="p1"}
P2:
  Conditions:
  - stance{s=phase2;str=true} true
  Skills:
  - message{m="p2"}
P3:
  Conditions:
  - stance{s=phase3;str=true} true
  Skills:
  - message{m="p3"}

