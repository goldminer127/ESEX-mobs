windEagleAirSlashes:
  Skills:
  - missile{v=16;
               bulletType=ITEM;material=FEATHER;
               onTick=windEagleAirSlashs-Tick;
               onHit=windEagleAirSlashs-Hit}
windEagleAirSlashs-Tick:
  Skills:
  #- effect:particles{p=block_marker-[cobweb];amount=2;speed=0;hS=0.2;vS=0.2;y=.4} @origin
windEagleAirSlashs-Hit:
  Skills:
  - damage{a=6}
  
windEagleSkyPlunge:
  Skills:
  - damage{a=8} @pir{r=20;limit=1;sort=NEAREST}

windEagleGust:
  Skills:
  - sound{s=entity.ender_dragon.flap;v=3;repeat=3;repeatI=10} @self #Volume doesn't actually mean volume it means 'max distance heard at' (v * 16)
  - damage{a=1;repeat=3;repeatI=10}
  #I can't find a specific 'knockback' mechanic but damage knocks you back so eh idk
  
windEagleDodgeCheck:
  Conditions:
  - damagecause{cause=PROJECTILE} true
  Skills:
  - skill{s=windEagleDodge} @self .7
windEagleDodge:
  Skills:
  - message{m="Dodge Check"} @pir{r=32}
  - potion{type=DAMAGE_RESISTANCE;duration=10;level=255;p=true}
  
