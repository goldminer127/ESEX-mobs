spawnShieldStartup:
  Skills:
  - delay 100-300
  - sound{s=item.armor.equip_iron;v=1;p=2}
  - setstance{stance=shieldReady} @self
  
shieldSkillReady:
  Conditions:
  - stance{s=shieldReady;str=true} true
  - damagecause{cause=ENTITY_ATTACK} true #need to add in orElseCast shieldSkillReady2 --- with cause=PROJ 
                                                        # - offgcd
  Skills:
  - potion{type=DAMAGE_RESISTANCE;duration=100;level=255;p=false} #cd=10
  - setstance{stance=shieldOnCooldown} @self
  - delay 200-400
  - sound{s=item.armor.equip_iron;v=1;p=2}
  - setstance{stance=shieldReady} @self
#  
#
#  These are the skills the mob uses.
  - skill{s=spawnShieldStartup} @self ~onSpawn
  - skill{s=shieldSkillReady} ~onDamaged <85%
  

  
