fHWHCursedBeam: 
  Skills:
  - delay 5-60
  - projectile{i=1;oT=fHWHCursedBeam-Tick;oH=fHWHCursedBeam-Hit;mr=20;sE=false;sB=true;sfo=0;v=10} @Target
fHWHCursedBeam-Tick:
  Skills:
  - effect:particles{p=spell_mob;amount=2;speed=0;hS=0.05;vS=0.05} @origin
  - effect:particles{p=spell_mob_ambient;amount=2;speed=0;hS=0.05;vS=0.05} @origin
fHWHCursedBeam-Hit:
  Skills:
  - damage{a=8;pkb=true}

