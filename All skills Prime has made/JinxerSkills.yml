#Fallen Hero Warden skills:

fHWhaloBarrierShieldStartup:
  Skills:
  - delay 100-300
  - sound{s=item.armor.equip_iron;v=1;p=2}
  - setstance{stance=shieldReady} @self
  - message{m="spawn delay"} @PlayersInRadius{r=30} #testing reasons
  
fHWhaloBarrier:
  Conditions:
  - stance{s=shieldReady;str=true} true
  - damagecause{cause=ENTITY_ATTACK} true
  Skills:
  - potion{type=DAMAGE_RESISTANCE;duration=200;level=255;p=false}
  - setstance{stance=shieldOnCooldown} @self
  - message{m="shieldOnCooldown"} @PlayersInRadius{r=30} #testing reasons
  - delay 350-575
  - sound{s=item.armor.equip_iron;v=1;p=2}
  - message{m="post delay"} @PlayersInRadius{r=30} #testing reasons
  - setstance{stance=shieldReady} @self

fHWmansBestFriend:
  Skills:
  - summon{type=fallenHaloWardenHound;amount=3;r=6} @Self

fHWhollowEyes:
  Skills:
  #change model to have 'hollow eyes'
  - potion{type=SPEED;duration=1200;level=0}
  #- potion{type=DAMAGE_RESISTANCE;duration=1200;level=1} 
  
fHWchangeWeapons:
  Skills:
  - delay 5
  - randomskill{skills=equipFRSSpear,equipFRSSword,equipFRSMace}
equipFRSSpear:
  Skills:
  - equip{item=iron_shovel HAND}
equipFRSSword:
  Skills:
  - equip{item=iron_sword HAND}
equipFRSMace:
  Skills:
  - equip{item=iron_axe HAND}
  

