  - blackscreen{d=30}
  - delay 35
  - potion{type=WITHER;duration=100;level=0}
  - delay 12
  - damage{a=2;ia=true}
  - delay 15
  - damage{a=3;ia=true}
  - delay 18
  - damage{a=4;ia=true}
  
