  - randomskill{skills= summonDark, summonFire, summonWind, summonEarth, summonWater, summonIce}
  
summonDark:
  Skills:
  - summon{type=SkullDark}

summonFire:
  Skills:
  - summon{type=SkullFire}
  
summonWind:
  Skills:
  - summon{type=SkullWind}
  
summonEarth:
  Skills:
  - summon{type=SkullEarth}
  
summonWater:
  Skills:
  - summon{type=SkullWater}